<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机抽人系统</title>
    <style>
        :root {
            --bg-secondary: rgba(32, 32, 32, 0.75);
            --bg-tertiary: rgba(45, 45, 45, 0.75);
            --bg-hover: rgba(255, 255, 255, 0.08);
            --accent-default: #60CDFF;
            --accent-hover: #7AD4FF;
            --accent-text: #000000;
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.78);
            --text-tertiary: rgba(255, 255, 255, 0.54);
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.36);
            --shadow-button: 0 2px 4px rgba(0, 0, 0, 0.14);
            --radius-card: 16px;
            --radius-button: 8px;
            --radius-small: 4px;
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI Variable', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: #60CDFF;
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: #FF6B6B;
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 250px;
            height: 250px;
            background: #4ECDC4;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 30px) scale(1.02); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 700px;
            padding: var(--spacing-xl);
        }

        .glass-card {
            background: rgba(35, 35, 35, 0.75);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: var(--radius-card);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: var(--shadow-card);
            padding: var(--spacing-xl);
            text-align: center;
        }

        .header {
            margin-bottom: var(--spacing-lg);
        }

        .title {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-tertiary);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .class-selector {
            margin-bottom: var(--spacing-lg);
        }

        .class-select {
            width: 100%;
            max-width: 300px;
            padding: var(--spacing-md);
            font-size: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-button);
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-primary);
            cursor: pointer;
            outline: none;
        }

        .class-select:focus {
            border-color: var(--accent-default);
            box-shadow: 0 0 0 2px rgba(96, 205, 255, 0.2);
        }

        .display-area {
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: var(--spacing-xl);
            position: relative;
        }

        .name-display {
            font-size: 64px;
            font-weight: 700;
            color: var(--text-primary);
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            transition: transform 0.15s ease, opacity 0.15s ease;
            word-break: break-word;
            padding: 0 var(--spacing-md);
        }

        .name-display.pulse {
            animation: pulse 0.5s ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        .name-display.spin {
            opacity: 0.8;
            transform: scale(0.95);
        }

        .placeholder {
            font-size: 32px;
            font-weight: 400;
            color: var(--text-tertiary);
        }

        .winner-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            animation: confettiFall 1s ease-out forwards;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(200px) rotate(720deg);
                opacity: 0;
            }
        }

        .controls {
            display: flex;
            gap: var(--spacing-md);
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
            padding: var(--spacing-md) var(--spacing-xl);
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: var(--radius-button);
            cursor: pointer;
            transition: all 0.15s ease;
            min-width: 140px;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background: var(--accent-default);
            color: var(--accent-text);
            box-shadow: var(--shadow-button), 0 0 20px rgba(96, 205, 255, 0.3);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            box-shadow: var(--shadow-button), 0 0 30px rgba(96, 205, 255, 0.5);
        }

        .btn-primary:disabled {
            background: rgba(96, 205, 255, 0.3);
            color: rgba(0, 0, 0, 0.4);
            cursor: not-allowed;
            box-shadow: none;
        }

        .admin-link {
            position: fixed;
            top: var(--spacing-md);
            right: var(--spacing-md);
            color: var(--text-tertiary);
            font-size: 12px;
            text-decoration: none;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .admin-link:hover {
            opacity: 1;
        }

        .status-bar {
            margin-top: var(--spacing-lg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-md);
            background: rgba(0, 0, 0, 0.2);
            border-radius: var(--radius-small);
        }

        .file-status {
            font-size: 13px;
            color: var(--text-tertiary);
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }

        .file-status.success {
            color: #4ECDC4;
        }

        .file-status.error {
            color: #FF6B6B;
        }

        .count-badge {
            font-size: 13px;
            color: var(--text-secondary);
            background: rgba(96, 205, 255, 0.15);
            padding: var(--spacing-xs) var(--spacing-sm);
            border-radius: var(--radius-small);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .shake {
            animation: shake 0.3s ease-in-out;
        }

        @media (max-width: 600px) {
            .container {
                padding: var(--spacing-md);
            }

            .glass-card {
                padding: var(--spacing-lg);
            }

            .name-display {
                font-size: 40px;
            }

            .btn {
                min-width: 120px;
                padding: var(--spacing-sm) var(--spacing-lg);
            }

            .controls {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="background">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <a href="admin.html" class="admin-link">管理后台</a>

    <div class="container">
        <div class="glass-card">
            <div class="header">
                <div class="title">随机抽人系统</div>
            </div>

            <div class="class-selector">
                <select class="class-select" id="classSelect">
                    <option value="">请选择班级...</option>
                </select>
            </div>

            <div class="display-area">
                <div class="name-display" id="nameDisplay">
                    <span class="placeholder">请选择班级</span>
                </div>
                <div class="winner-effect" id="winnerEffect"></div>
            </div>

            <div class="controls">
                <button class="btn btn-primary" id="startBtn" disabled>
                    <span>🎲</span> 开始抽取
                </button>
            </div>

            <div class="status-bar">
                <div class="file-status" id="fileStatus">
                    <span>⚠️</span>
                    <span>请选择班级</span>
                </div>
                <div class="count-badge" id="countBadge">0 人</div>
            </div>
        </div>
    </div>

    <script>
        // ========== 配置区域 ==========
        const SUPABASE_URL = 'https://oeavmammvqjapqebhrfn.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9lYXZtYW1tdnFqYXBxZWJocmZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxOTczNzgsImV4cCI6MjA4Nzc3MzM3OH0.i4ryKmtDtpDyCqlGu7fqpMa3T8eoD7CmcfWmISxDgE8';
        const CURRENT_GRADE = '高一';  // 当前网页对应的年级
        // =================================

        let names = [];
        let currentClassId = '';
        let currentClassName = '';
        let isRunning = false;
        let intervalId = null;

        const nameDisplay = document.getElementById('nameDisplay');
        const startBtn = document.getElementById('startBtn');
        const classSelect = document.getElementById('classSelect');
        const fileStatus = document.getElementById('fileStatus');
        const countBadge = document.getElementById('countBadge');
        const winnerEffect = document.getElementById('winnerEffect');

        async function init() {
            await loadClasses();
            setupEventListeners();
        }

        async function loadClasses() {
            try {
                // 只查询当前年级的班级
                const response = await fetch(`${SUPABASE_URL}/rest/v1/classes?grade=eq.${encodeURIComponent(CURRENT_GRADE)}&select=id,name&order=name`, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });

                if (response.ok) {
                    const classes = await response.json();
                    classSelect.innerHTML = '<option value="">请选择班级...</option>';
                    classes.forEach(cls => {
                        const option = document.createElement('option');
                        option.value = cls.id;
                        option.textContent = cls.name;
                        classSelect.appendChild(option);
                    });
                }
            } catch (err) {
                console.error('加载班级失败:', err);
                updateStatus(false, '加载班级失败', 0);
            }
        }

        async function loadClassStudents(classId) {
            try {
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/students?class_id=eq.${classId}&select=name&order=name`,
                    {
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                        }
                    }
                );

                if (response.ok) {
                    const students = await response.json();
                    names = students.map(s => s.name);

                    if (names.length > 0) {
                        updateStatus(true, `已加载: ${currentClassName}`, names.length);
                        startBtn.disabled = false;
                        nameDisplay.innerHTML = '<span class="placeholder">准备开始</span>';
                    } else {
                        names = [];
                        updateStatus(false, '该班级暂无学生', 0);
                        startBtn.disabled = true;
                        nameDisplay.innerHTML = '<span class="placeholder">该班级暂无学生</span>';
                    }

                    countBadge.textContent = `${names.length} 人`;
                }
            } catch (err) {
                console.error('加载学生失败:', err);
                names = [];
                updateStatus(false, '加载学生失败', 0);
                startBtn.disabled = true;
            }
        }

        function updateStatus(success, message, count) {
            fileStatus.className = 'file-status ' + (success ? 'success' : 'error');
            fileStatus.innerHTML = `<span>${success ? '✅' : '⚠️'}</span><span>${message}</span>`;
            countBadge.textContent = `${count} 人`;
        }

        function setupEventListeners() {
            classSelect.addEventListener('change', async (e) => {
                const classId = e.target.value;
                if (classId) {
                    const selectedOption = e.target.options[e.target.selectedIndex];
                    currentClassName = selectedOption.textContent;
                    await loadClassStudents(classId);
                } else {
                    names = [];
                    currentClassId = '';
                    currentClassName = '';
                    updateStatus(false, '请选择班级', 0);
                    startBtn.disabled = true;
                    nameDisplay.innerHTML = '<span class="placeholder">请选择班级</span>';
                }
            });

            startBtn.addEventListener('click', togglePicker);
        }

        function togglePicker() {
            if (isRunning) {
                stopPicker();
            } else {
                startPicker();
            }
        }

        function startPicker() {
            if (names.length === 0) {
                nameDisplay.classList.add('shake');
                setTimeout(() => nameDisplay.classList.remove('shake'), 300);
                return;
            }

            isRunning = true;
            startBtn.innerHTML = '<span>⏹️</span> 停止';

            // 持续快速滚动，不减速
            function cycle() {
                const randomIndex = Math.floor(Math.random() * names.length);
                nameDisplay.innerHTML = `<span class="spin">${names[randomIndex]}</span>`;

                if (isRunning) {
                    intervalId = setTimeout(cycle, 50); // 保持50ms快速滚动
                }
            }

            cycle();
        }

        function stopPicker() {
            if (!isRunning) return;

            isRunning = false;
            if (intervalId) {
                clearTimeout(intervalId);
                intervalId = null;
            }

            // 显示中奖者
            const winnerIndex = Math.floor(Math.random() * names.length);
            const winner = names[winnerIndex];

            nameDisplay.innerHTML = winner;
            nameDisplay.classList.add('pulse');

            createConfetti();

            startBtn.innerHTML = '<span>🎲</span> 再次抽取';

            setTimeout(() => {
                nameDisplay.classList.remove('pulse');
            }, 500);
        }

        function createConfetti() {
            const colors = ['#60CDFF', '#FF6B6B', '#4ECDC4', '#FFE66D', '#95E1D3', '#F38181'];
            winnerEffect.innerHTML = '';

            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = `${Math.random() * 400 - 200}px`;
                confetti.style.top = `${Math.random() * 100 - 50}px`;
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = `${Math.random() * 0.3}s`;
                confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                winnerEffect.appendChild(confetti);
            }

            setTimeout(() => {
                winnerEffect.innerHTML = '';
            }, 1500);
        }

        init();
    </script>
</body>
</html>
