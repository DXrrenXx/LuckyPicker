<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台</title>
    <style>
        :root {
            --bg-secondary: rgba(32, 32, 32, 0.75);
            --bg-tertiary: rgba(45, 45, 45, 0.75);
            --bg-hover: rgba(255, 255, 255, 0.08);
            --accent-default: #60CDFF;
            --accent-hover: #7AD4FF;
            --accent-text: #000000;
            --text-primary: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.78);
            --text-tertiary: rgba(255, 255, 255, 0.54);
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.36);
            --shadow-button: 0 2px 4px rgba(0, 0, 0, 0.14);
            --radius-card: 16px;
            --radius-button: 8px;
            --radius-small: 4px;
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI Variable', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: var(--spacing-xl);
            color: var(--text-primary);
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: var(--spacing-xl);
        }

        .title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: var(--spacing-sm);
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-tertiary);
        }

        .back-link {
            position: fixed;
            top: var(--spacing-md);
            left: var(--spacing-md);
            color: var(--text-tertiary);
            font-size: 14px;
            text-decoration: none;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .back-link:hover {
            opacity: 1;
        }

        .glass-card {
            background: rgba(35, 35, 35, 0.75);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: var(--radius-card);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: var(--shadow-card);
            padding: var(--spacing-xl);
            margin-bottom: var(--spacing-lg);
        }

        .form-group {
            margin-bottom: var(--spacing-lg);
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: var(--spacing-sm);
        }

        .form-input {
            width: 100%;
            padding: var(--spacing-md);
            font-size: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-button);
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            border-color: var(--accent-default);
            box-shadow: 0 0 0 2px rgba(96, 205, 255, 0.2);
        }

        .form-textarea {
            min-height: 150px;
            resize: vertical;
            font-family: inherit;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
            padding: var(--spacing-md) var(--spacing-xl);
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: var(--radius-button);
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background: var(--accent-default);
            color: var(--accent-text);
            box-shadow: var(--shadow-button);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-danger {
            background: #FF6B6B;
            color: white;
        }

        .btn-danger:hover {
            background: #ff8585;
        }

        .class-list {
            margin-top: var(--spacing-lg);
        }

        .class-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-md);
            background: rgba(0, 0, 0, 0.2);
            border-radius: var(--radius-button);
            margin-bottom: var(--spacing-sm);
        }

        .class-info {
            flex: 1;
        }

        .class-name {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: var(--spacing-xs);
        }

        .class-count {
            font-size: 13px;
            color: var(--text-tertiary);
        }

        .class-actions {
            display: flex;
            gap: var(--spacing-sm);
        }

        .btn-sm {
            padding: var(--spacing-sm) var(--spacing-md);
            font-size: 13px;
        }

        .message {
            padding: var(--spacing-md);
            border-radius: var(--radius-button);
            margin-bottom: var(--spacing-lg);
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: rgba(78, 205, 196, 0.2);
            color: #4ECDC4;
            border: 1px solid rgba(78, 205, 196, 0.3);
        }

        .message.error {
            background: rgba(255, 107, 107, 0.2);
            color: #FF6B6B;
            border: 1px solid rgba(255, 107, 107, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: var(--spacing-xl);
            color: var(--text-tertiary);
        }

        @media (max-width: 600px) {
            body {
                padding: var(--spacing-md);
            }

            .glass-card {
                padding: var(--spacing-lg);
            }

            .class-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .class-actions {
                margin-top: var(--spacing-sm);
                width: 100%;
            }

            .class-actions .btn {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>

    <a href="index.html" class="back-link">← 返回抽人页面</a>

    <div class="container">
        <div class="header">
            <div class="title">管理后台</div>
            <div class="subtitle">管理班级和学生名单</div>
        </div>

        <div class="glass-card">
            <div class="message" id="message"></div>

            <div class="form-group">
                <label class="form-label">班级名称</label>
                <input type="text" class="form-input" id="className" placeholder="例如：高一(1)班">
            </div>

            <div class="form-group">
                <label class="form-label">学生名单（每行一个名字）</label>
                <textarea class="form-input form-textarea" id="studentNames" placeholder="张三&#10;李四&#10;王五"></textarea>
            </div>

            <button class="btn btn-primary" id="addClassBtn">
                <span>➕</span> 添加班级
            </button>
        </div>

        <div class="glass-card">
            <h3 style="margin-bottom: var(--spacing-md);">已有班级</h3>
            <div class="class-list" id="classList">
                <div class="empty-state">暂无班级，请添加</div>
            </div>
        </div>
    </div>

    <script>
        // ========== 配置区域 ==========
        const SUPABASE_URL = 'https://oeavmammvqjapqebhrfn.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9lYXZtYW1tdnFqYXBxZWJocmZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxOTczNzgsImV4cCI6MjA4Nzc3MzM3OH0.i4ryKmtDtpDyCqlGu7fqpMa3T8eoD7CmcfWmISxDgE8';
        const CURRENT_GRADE = '高一';  // 当前网页对应的年级
        // =================================

        const messageEl = document.getElementById('message');
        const classNameInput = document.getElementById('className');
        const studentNamesInput = document.getElementById('studentNames');
        const addClassBtn = document.getElementById('addClassBtn');
        const classListEl = document.getElementById('classList');

        function showMessage(text, isSuccess = true) {
            messageEl.textContent = text;
            messageEl.className = `message show ${isSuccess ? 'success' : 'error'}`;
            setTimeout(() => {
                messageEl.className = 'message';
            }, 3000);
        }

        async function loadClasses() {
            try {
                // 只查询当前年级的班级
                const response = await fetch(`${SUPABASE_URL}/rest/v1/classes?grade=eq.${encodeURIComponent(CURRENT_GRADE)}&select=*&order=created_at.desc`, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });

                if (response.ok) {
                    const classes = await response.json();
                    renderClassList(classes);
                }
            } catch (err) {
                console.error('加载班级失败:', err);
                showMessage('加载班级失败', false);
            }
        }

        async function getStudentCount(classId) {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/students?class_id=eq.${classId}&select=id`, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });

                if (response.ok) {
                    const students = await response.json();
                    return students.length;
                }
            } catch (err) {
                console.error('获取学生数量失败:', err);
            }
            return 0;
        }

        async function renderClassList(classes) {
            if (classes.length === 0) {
                classListEl.innerHTML = '<div class="empty-state">暂无班级，请添加</div>';
                return;
            }

            let html = '';
            for (const cls of classes) {
                const count = await getStudentCount(cls.id);
                html += `
                    <div class="class-item" data-id="${cls.id}">
                        <div class="class-info">
                            <div class="class-name">${cls.name}</div>
                            <div class="class-count">${count} 名学生</div>
                        </div>
                        <div class="class-actions">
                            <button class="btn btn-secondary btn-sm" onclick="editClass('${cls.id}', '${cls.name}')">编辑</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteClass('${cls.id}')">删除</button>
                        </div>
                    </div>
                `;
            }
            classListEl.innerHTML = html;
        }

        async function addClass() {
            const className = classNameInput.value.trim();
            const studentNamesText = studentNamesInput.value.trim();

            if (!className) {
                showMessage('请输入班级名称', false);
                return;
            }

            if (!studentNamesText) {
                showMessage('请输入学生名单', false);
                return;
            }

            const studentNames = studentNamesText.split('\n').map(s => s.trim()).filter(s => s);

            if (studentNames.length === 0) {
                showMessage('学生名单不能为空', false);
                return;
            }

            try {
                // 添加班级
                const classResponse = await fetch(`${SUPABASE_URL}/rest/v1/classes`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify({
                        name: className,
                        grade: CURRENT_GRADE
                    })
                });

                if (!classResponse.ok) {
                    throw new Error('添加班级失败');
                }

                const newClass = await classResponse.json();
                const classId = newClass[0].id;

                // 添加学生
                const students = studentNames.map(name => ({
                    name: name,
                    class_id: classId
                }));

                const studentsResponse = await fetch(`${SUPABASE_URL}/rest/v1/students`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(students)
                });

                if (!studentsResponse.ok) {
                    throw new Error('添加学生失败');
                }

                showMessage(`成功添加班级"${className}"，共 ${studentNames.length} 名学生`);

                // 清空输入
                classNameInput.value = '';
                studentNamesInput.value = '';

                // 重新加载列表
                await loadClasses();

            } catch (err) {
                console.error('添加班级失败:', err);
                showMessage('添加班级失败: ' + err.message, false);
            }
        }

        async function deleteClass(classId) {
            if (!confirm('确定要删除这个班级吗？')) {
                return;
            }

            try {
                // 先删除学生
                await fetch(`${SUPABASE_URL}/rest/v1/students?class_id=eq.${classId}`, {
                    method: 'DELETE',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });

                // 再删除班级
                await fetch(`${SUPABASE_URL}/rest/v1/classes?id=eq.${classId}`, {
                    method: 'DELETE',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });

                showMessage('删除成功');
                await loadClasses();

            } catch (err) {
                console.error('删除失败:', err);
                showMessage('删除失败', false);
            }
        }

        async function editClass(classId, className) {
            const newName = prompt('请输入新的班级名称:', className);
            if (!newName || newName === className) return;

            try {
                await fetch(`${SUPABASE_URL}/rest/v1/classes?id=eq.${classId}`, {
                    method: 'PATCH',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name: newName })
                });

                showMessage('修改成功');
                await loadClasses();

            } catch (err) {
                console.error('修改失败:', err);
                showMessage('修改失败', false);
            }
        }

        addClassBtn.addEventListener('click', addClass);

        // 初始加载
        loadClasses();
    </script>
</body>
</html>
